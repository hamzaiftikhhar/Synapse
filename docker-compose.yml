# Optional Docker Postgres — prefer local Homebrew PostgreSQL 18 + pgvector.
# Usage (if Docker is installed): docker compose up -d
#
# Note: pgvector publishes tagged images for supported majors.
# Local Synapse development is validated against PostgreSQL 18.x.

services:
  db:
    image: pgvector/pgvector:pg17
    container_name: synapse-db
    restart: unless-stopped
    profiles: ["docker-db"]
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse
    ports:
      - "5432:5432"
    volumes:
      - synapse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  synapse_pgdata:
